name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  QT_VERSION: 6.10.3
  OPENCV_VERSION: 4.13.0
  OPENCV_SOURCE_SHA256: 1d40ca017ea51c533cf9fd5cbde5b5fe7ae248291ddf2af99d4c17cf8e13017d
  OPENCV_WINDOWS_SHA256: f0e98c302464d6860777a7015065e11b9b271b5394e6ba92663f0cf1fc303f2c
  ONNXRUNTIME_VERSION: 1.27.1
  ONNXRUNTIME_LINUX_SHA256: 25b1ef1fea1acd210d63f8f24dc870ad6e077795ce1f54876252c6d3803c15af
  ONNXRUNTIME_DIRECTML_VERSION: 1.24.4
  ONNXRUNTIME_DIRECTML_SHA256: 57e9f11b73437bef7a309496135d4c1f96b1a8e9ddba60013fa27bfc1d788681
  DIRECTML_VERSION: 1.15.4
  DIRECTML_SHA256: 4e7cb7ddce8cf837a7a75dc029209b520ca0101470fcdf275c1f49736a3615b9

jobs:
  macos:
    name: Build macOS DMG
    runs-on: macos-15
    env:
      CMAKE_PREFIX_PATH: /opt/homebrew
      PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig
      HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
      MACOSX_DEPLOYMENT_TARGET: '15.0'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install dependencies
        run: brew install cmake qt opencv onnxruntime spdlog exiv2 ffmpeg

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@fe74d46e82474f87e1ba79832ad28a4013d0e33a # v6
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Build, sign & package DMG
        env:
          DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
        run: bash scripts/package_macos.sh

      - name: Notarize & staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          DMG=$(ls dist/macos/*.dmg | head -n1)
          bash scripts/notarize_macos.sh "$DMG"

      - name: Stage artifact
        run: |
          mkdir -p artifacts
          cp "$(ls dist/macos/*.dmg | head -n1)" artifacts/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: macos-dmg
          path: artifacts/*.dmg

  windows:
    name: Build Windows zip
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4
        with:
          version: '${{ env.QT_VERSION }}'
          host: windows
          target: desktop
          arch: win64_msvc2022_64

      - name: Set up MSVC environment
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) { throw "No Visual Studio installation with MSVC tools was found" }
          cmd /s /c "`"$vsPath\VC\Auxiliary\Build\vcvars64.bat`" && set" | ForEach-Object {
            if ($_ -match '^([^=]+)=(.*)$') {
              "$($matches[1])=$($matches[2])" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            }
          }

      - name: Install OpenCV
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/opencv/opencv/releases/download/$env:OPENCV_VERSION/opencv-$env:OPENCV_VERSION-windows.exe" -OutFile opencv.exe
          $h = (Get-FileHash -Algorithm SHA256 opencv.exe).Hash.ToLower()
          if ($h -ne "$env:OPENCV_WINDOWS_SHA256") { throw "OpenCV SHA256 mismatch: got $h" }
          Start-Process -FilePath .\opencv.exe -ArgumentList '-o"C:\opencv" -y' -Wait
          $config = Get-ChildItem C:\opencv\opencv\build -Recurse -Filter OpenCVConfig.cmake -File |
            Where-Object { $_.FullName -match '\\x64\\vc[0-9]+\\lib\\OpenCVConfig\.cmake$' } |
            Select-Object -First 1
          if (-not $config) { throw "OpenCVConfig.cmake was not found in the extracted package" }
          "OpenCV_DIR=$($config.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install ONNX Runtime (DirectML)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://api.nuget.org/v3-flatcontainer/microsoft.ml.onnxruntime.directml/$env:ONNXRUNTIME_DIRECTML_VERSION/microsoft.ml.onnxruntime.directml.$env:ONNXRUNTIME_DIRECTML_VERSION.nupkg" -OutFile onnx-dml.zip
          $h = (Get-FileHash -Algorithm SHA256 onnx-dml.zip).Hash.ToLower()
          if ($h -ne "$env:ONNXRUNTIME_DIRECTML_SHA256") { throw "ONNX Runtime DirectML SHA256 mismatch: got $h" }
          Invoke-WebRequest -Uri "https://api.nuget.org/v3-flatcontainer/microsoft.ai.directml/$env:DIRECTML_VERSION/microsoft.ai.directml.$env:DIRECTML_VERSION.nupkg" -OutFile directml.zip
          $h = (Get-FileHash -Algorithm SHA256 directml.zip).Hash.ToLower()
          if ($h -ne "$env:DIRECTML_SHA256") { throw "DirectML SHA256 mismatch: got $h" }
          Expand-Archive -Path onnx-dml.zip -DestinationPath C:\onnx-dml-pkg -Force
          Expand-Archive -Path directml.zip -DestinationPath C:\directml-pkg -Force
          New-Item -ItemType Directory -Force -Path C:\onnx\include, C:\onnx\lib | Out-Null
          Copy-Item C:\onnx-dml-pkg\build\native\include\* C:\onnx\include
          Copy-Item C:\onnx-dml-pkg\runtimes\win-x64\native\onnxruntime.dll, C:\onnx-dml-pkg\runtimes\win-x64\native\onnxruntime.lib C:\onnx\lib
          Copy-Item C:\directml-pkg\bin\x64-win\DirectML.dll C:\onnx\lib
          "ONNXRUNTIME_ROOT=C:\onnx" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install spdlog and Exiv2
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install "spdlog:x64-windows-static-md" "exiv2:x64-windows-static-md"

      - name: Build & package
        shell: pwsh
        run: |
          $env:CMAKE_PREFIX_PATH = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static-md"
          ./scripts/package_windows.ps1 `
            -QtRoot $env:QT_ROOT_DIR `
            -OpenCvRoot $env:OpenCV_DIR `
            -OnnxRuntimeRoot $env:ONNXRUNTIME_ROOT `
            -Generator "Ninja"

      - name: Stage artifact
        shell: pwsh
        run: |
          $ver = ([regex]'VERSION ([0-9]+\.[0-9]+\.[0-9]+)').Match((Get-Content CMakeLists.txt -Raw)).Groups[1].Value
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path dist/windows/CloakFrame/* -DestinationPath "artifacts/CloakFrame-$ver-windows-x64.zip" -Force

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-zip
          path: artifacts/*.zip

  linux:
    name: Build Linux AppImage
    runs-on: ubuntu-26.04
    env:
      APPIMAGE_EXTRACT_AND_RUN: 1
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build build-essential pkg-config file desktop-file-utils \
            libjpeg-dev libpng-dev libtiff-dev libwebp-dev \
            libspdlog-dev libexiv2-dev \
            libgl1-mesa-dev libxcb-cursor0 libxcb-xinerama0 libxkbcommon-x11-0

      - name: Install OpenCV
        run: |
          curl -fL "https://github.com/opencv/opencv/archive/refs/tags/${OPENCV_VERSION}.tar.gz" -o opencv.tar.gz
          echo "${OPENCV_SOURCE_SHA256}  opencv.tar.gz" | sha256sum -c -
          tar -xzf opencv.tar.gz
          cmake -S "opencv-${OPENCV_VERSION}" -B opencv-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$HOME/opencv" \
            -DCMAKE_INSTALL_LIBDIR=lib \
            -DBUILD_LIST=core,dnn,imgcodecs,imgproc,objdetect \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_PERF_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_opencv_apps=OFF \
            -DBUILD_JAVA=OFF \
            -DBUILD_opencv_python3=OFF \
            -DWITH_FFMPEG=OFF \
            -DWITH_GSTREAMER=OFF \
            -DWITH_QT=OFF
          cmake --build opencv-build --parallel
          cmake --install opencv-build
          echo "OpenCV_DIR=$HOME/opencv/lib/cmake/opencv4" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$HOME/opencv/lib" >> "$GITHUB_ENV"

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4
        with:
          version: '${{ env.QT_VERSION }}'
          host: linux
          target: desktop
          arch: linux_gcc_64

      - name: Install ONNX Runtime
        run: |
          curl -fL "https://github.com/microsoft/onnxruntime/releases/download/v${ONNXRUNTIME_VERSION}/onnxruntime-linux-x64-${ONNXRUNTIME_VERSION}.tgz" -o onnx.tgz
          echo "${ONNXRUNTIME_LINUX_SHA256}  onnx.tgz" | sha256sum -c -
          mkdir -p "$HOME/onnx"
          tar -xzf onnx.tgz -C "$HOME/onnx"
          echo "ONNXRUNTIME_ROOT=$HOME/onnx/onnxruntime-linux-x64-${ONNXRUNTIME_VERSION}" >> "$GITHUB_ENV"

      - name: Build & package AppImage
        run: |
          export QMAKE="$QT_ROOT_DIR/bin/qmake"
          bash scripts/package_linux.sh

      - name: Stage artifact
        run: |
          mkdir -p artifacts
          cp dist/linux/*.AppImage artifacts/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: linux-appimage
          path: artifacts/*.AppImage

  release:
    name: Publish release
    needs: [macos, windows, linux]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Verify release notes
        run: |
          NOTES="release-notes/${GITHUB_REF_NAME}.md"
          if [ ! -s "$NOTES" ]; then
            echo "Missing release notes: $NOTES" >&2
            exit 1
          fi

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS

      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          body_path: release-notes/${{ github.ref_name }}.md
          files: artifacts/**/*
