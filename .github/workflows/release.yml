name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  MODEL_BASE_URL: https://huggingface.co/RuteNL/SCRFD-face-detection-ONNX/resolve/main

jobs:
  macos:
    name: Build macOS DMG
    runs-on: macos-15
    env:
      CMAKE_PREFIX_PATH: /opt/homebrew
      PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake qt opencv onnxruntime spdlog

      - name: Download SCRFD models
        run: |
          mkdir -p models
          curl -fL -o models/10g_bnkps.onnx  "$MODEL_BASE_URL/10g_bnkps.onnx"
          curl -fL -o models/2.5g_bnkps.onnx "$MODEL_BASE_URL/2.5g_bnkps.onnx"

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Build, sign & package DMG
        env:
          DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
        run: bash scripts/package_macos.sh

      - name: Notarize & staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          DMG=$(ls dist/macos/*.dmg | head -n1)
          bash scripts/notarize_macos.sh "$DMG"

      - name: Stage artifact
        run: |
          mkdir -p artifacts
          DMG=$(ls dist/macos/*.dmg | head -n1)
          cp "$DMG" "artifacts/FaceVeil-${GITHUB_REF_NAME}-macos-arm64.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/*.dmg

  windows:
    name: Build Windows zip
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.1'
          host: windows
          target: desktop
          arch: win64_msvc2022_64

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install OpenCV
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/opencv/opencv/releases/download/4.10.0/opencv-4.10.0-windows.exe" -OutFile opencv.exe
          Start-Process -FilePath .\opencv.exe -ArgumentList '-o"C:\opencv" -y' -Wait
          "OpenCV_DIR=C:\opencv\opencv\build\x64\vc16\lib" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install ONNX Runtime
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/microsoft/onnxruntime/releases/download/v1.20.1/onnxruntime-win-x64-1.20.1.zip" -OutFile onnx.zip
          Expand-Archive -Path onnx.zip -DestinationPath C:\onnx -Force
          "ONNXRUNTIME_ROOT=C:\onnx\onnxruntime-win-x64-1.20.1" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install spdlog
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install "spdlog:x64-windows-static-md"

      - name: Download SCRFD models
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path models | Out-Null
          Invoke-WebRequest -Uri "$env:MODEL_BASE_URL/10g_bnkps.onnx"  -OutFile models/10g_bnkps.onnx
          Invoke-WebRequest -Uri "$env:MODEL_BASE_URL/2.5g_bnkps.onnx" -OutFile models/2.5g_bnkps.onnx

      - name: Build & package
        shell: pwsh
        run: |
          $env:CMAKE_PREFIX_PATH = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static-md"
          ./scripts/package_windows.ps1 `
            -QtRoot $env:QT_ROOT_DIR `
            -OpenCvRoot $env:OpenCV_DIR `
            -OnnxRuntimeRoot $env:ONNXRUNTIME_ROOT `
            -Generator "Ninja"

      - name: Stage artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $zip = "artifacts/FaceVeil-$env:GITHUB_REF_NAME-windows-x64.zip"
          Compress-Archive -Path dist/windows/FaceVeil/* -DestinationPath $zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: artifacts/*.zip

  release:
    name: Publish release
    needs: [macos, windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes for this version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 == "# FaceVeil " ver {flag=1; print; next}
            flag && ($0 == "---" || /^# FaceVeil /) {exit}
            flag {print}
          ' RELEASE_NOTES.md > body.md
          if [ ! -s body.md ]; then
            echo "FaceVeil $VERSION" > body.md
          fi

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          body_path: body.md
          files: artifacts/**/*
